<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Martin Milon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .ty-wrap {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .ty-icon {
      font-size: 3rem;
      animation: fadeUp 0.6s 0.1s var(--ease-out) both;
    }
    .ty-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 1;
      letter-spacing: -0.03em;
      animation: fadeUp 0.6s 0.2s var(--ease-out) both;
    }
    .ty-sub {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--fg-muted);
      animation: fadeUp 0.6s 0.3s var(--ease-out) both;
    }
    .ty-back {
      animation: fadeUp 0.6s 0.4s var(--ease-out) both;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="ty-wrap">
    <div class="ty-icon">✓</div>
    <h1 class="ty-title">Message<br><em>received.</em></h1>
    <p class="ty-sub">I'll get back to you as soon as possible.</p>
    <a href="index.html" class="btn-primary ty-back">← Back home</a>
  </div>
  <script>
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') document.body.classList.add('dark');
  </script>
</body>
</html>
