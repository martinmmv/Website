<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Martin Milon</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .ty-wrap {
      min-height: calc(100svh - 58px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }
    .ty-mark {
      width: 64px; height: 64px;
      border: 2px solid var(--amber);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 1.4rem;
      color: var(--amber);
      margin-bottom: 2rem;
      animation: fadeUp 0.5s 0.1s both;
    }
    .ty-h {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.2s both;
    }
    .ty-h em { font-style: italic; color: var(--amber); }
    .ty-sub {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-4);
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.3s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">

      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="ty-wrap">
    <div class="ty-mark">✓</div>
    <h1 class="ty-h">Message<br><em>sent.</em></h1>
    <p class="ty-sub">I'll get back to you within 24 hours.</p>
    <a href="index.html" class="btn btn-solid">← Back home</a>
  </div>
</body>
</html>
